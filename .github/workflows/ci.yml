name: Cinema API - CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilar el proyecto
      - name: Build with Maven
        run: mvn clean compile -B

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn test -B

      # 5. Empaquetar el JAR
      - name: Package JAR
        run: mvn package -DskipTests -B

      # 6. Verificar que el JAR existe
      - name: Verify JAR was created
        run: ls -lh target/*.jar

      # 7. Construir imagen Docker
      - name: Build Docker image
        run: docker build -t cinema-api:latest .