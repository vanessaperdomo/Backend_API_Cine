name: Cinema API - CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B
        working-directory: cinema

      - name: Run tests
        run: mvn test -B
        working-directory: cinema

      - name: Package JAR
        run: mvn package -DskipTests -B
        working-directory: cinema

      - name: Verify JAR was created
        run: ls -lh target/*.jar
        working-directory: cinema

      - name: Build Docker image
        run: docker build -t cinema-api:latest .
        working-directory: cinema