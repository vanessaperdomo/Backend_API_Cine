# application.properties

spring.datasource.url=jdbc:postgresql://localhost:5433/cine_db
spring.datasource.username=cine_user
spring.datasource.password=cine_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=cine
spring.jpa.properties.hibernate.format_sql=true

spring.mvc.pathmatch.use-suffix-pattern=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method